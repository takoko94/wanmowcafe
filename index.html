<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff7f5;
}

/* 全体レイアウト */
.container {
  display: flex;
}

/* 左（メニュー側） */
.main {
  width: 70%;
}

/* 右（カート） */
.sidebar {
  width: 30%;
  background: #fff;
  border-left: 3px solid #ffd6dc;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 15px;
}

/* ロゴ */
.logo {
  width: 250px;
  display: block;
  margin: 10px auto;
}

/* タブ */
.tabbar {
  display: flex;
  overflow-x: auto;
  background: #ffe4ea;
  padding: 10px;
  position: sticky;
  top: 0;
}

.tab {
  margin: 0 5px;
  padding: 10px 15px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
}

.tab.active {
  background: hotpink;
  color: white;
}

/* メニュー */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.item {
  width: 180px;
  background: white;
  border-radius: 15px;
  padding: 10px;
  border: 2px solid #ffd6dc;
}

.item img {
  width: 100%;
}

/* ボタン */
button {
  margin: 2px;
  padding: 5px 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add1 { background: pink; }
.add10 { background: hotpink; color: white; }
.minus1 { background: #ddd; }
.minus10 { background: #aaa; color: white; }

/* カート */
.cart-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.total {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左 -->
  <div class="main">

    <img src="logo.png" class="logo">

    <div class="tabbar" id="tabbar"></div>

    <div id="menu"></div>

  </div>

  <!-- 右カート -->
  <div class="sidebar">

    <div class="cart-title">🧾 注文内容</div>
    <div id="cart">注文なし</div>

    <div class="total">
      合計: ¥<span id="total">0</span>
    </div>

    <button onclick="confirmOrder()">注文確定</button>
    <button onclick="resetCart()">リセット</button>

    <h3>履歴</h3>
    <div id="history">なし</div>

  </div>

</div>

<script>
const menuData = {
  "Drink": [
    ["も～も～ミルクラテ",3000,"milk_latte.png"],
    ["わんプレッソラテ",3000,"wanpresso.png"]
  ],
  "Food": [
    ["わんも～弁当",4000,"wanmow_bento.png"],
    ["わんも～プレート",6000,"wanmow_plate.png"]
  ],
  "Rescue": [
    ["も～も～点滴いちごみるく",3000,"strawberry_milk.png"]
  ]
};

let currentTab = "Drink";
let total = 0;
let cart = {};
let historyList = [];

function renderTabs() {
  const tabbar = document.getElementById("tabbar");
  tabbar.innerHTML = "";

  for (let key in menuData) {
    const div = document.createElement("div");
    div.className = "tab" + (key === currentTab ? " active" : "");
    div.innerText = key;

    div.onclick = () => {
      currentTab = key;
      renderTabs();
      renderMenu();
    };

    tabbar.appendChild(div);
  }
}

function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  menu.className = "menu";

  menuData[currentTab].forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item[2]}">
      <p>${item[0]}</p>
      <p>¥${item[1]}</p>

      <button onclick="removeItem('${item[0]}', ${item[1]}, 10)">-10</button>
      <button onclick="removeItem('${item[0]}', ${item[1]}, 1)">-1</button>
      <button onclick="addItem('${item[0]}', ${item[1]}, 1)">+1</button>
      <button onclick="addItem('${item[0]}', ${item[1]}, 10)">+10</button>
    `;

    menu.appendChild(div);
  });
}

function addItem(name, price, qty) {
  total += price * qty;
  cart[name] = (cart[name] || 0) + qty;
  updateUI();
}

function removeItem(name, price, qty) {
  if (!cart[name]) return;
  cart[name] -= qty;
  total -= price * qty;

  if (cart[name] <= 0) delete cart[name];
  if (total < 0) total = 0;

  updateUI();
}

function updateUI() {
  document.getElementById("total").innerText = total;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]}<br>`;
  }

  document.getElementById("cart").innerHTML = text || "注文なし";
}

function resetCart() {
  total = 0;
  cart = {};
  updateUI();
}

function confirmOrder() {
  if (Object.keys(cart).length === 0) return;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]} / `;
  }

  historyList.unshift(`¥${total} | ${text}`);
  document.getElementById("history").innerHTML =
    historyList.map(h => `<div>${h}</div>`).join("");

  resetCart();
}

renderTabs();
renderMenu();
</script>

</body>
</html>
