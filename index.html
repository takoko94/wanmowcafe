<style>

/* 🔥 フォント */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:#fff7f5;
  user-select:none;
  padding:10px;
}

/* レイアウト */
.container{
  display:flex;
  max-width:1200px;
  margin:0 auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:#fffafc;
  border-left:4px solid #ffc0cb;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
}

/* ロゴ */
.logo{
  width:260px;
  display:block;
  margin:10px auto;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  background:#ffe4ea;
  padding:10px;
}

.tab{
  margin:0 5px;
  padding:10px 15px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.tab.active{
  background:hotpink;
  color:white;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.item{
  width:200px;
  background:white;
  border-radius:15px;
  padding:12px;
  border:2px solid #ffd6dc;
}

.item img{
  width:100%;
}

/* ボタン */
.item div{
  display:flex;
  justify-content:center;
  gap:4px;
}

.qty-btn{
  padding:6px 8px;
  border:none;
  border-radius:999px;
  font-size:12px;
}

/* ===== 🔥 スマホ完全修正 ===== */
@media (max-width:800px){

  /* 縦並び */
  .container{
    flex-direction:column;
  }

  .main{
    width:100%;
    padding-bottom:180px; /* ←ここ重要 */
  }

  /* 👇 下固定バー */
  .sidebar{
    position:fixed !important;
    bottom:0;
    left:0;
    width:100%;
    height:160px; /* ←高さ固定 */
    overflow-y:auto;
    border-left:none;
    border-radius:20px 20px 0 0;
    background:#fffafc;
    z-index:9999;
  }

  /* 👇 カード2列 */
  .item{
    width:48% !important;
  }

  /* 👇 ボタン確実に大きく */
  .qty-btn{
    padding:16px !important;
    font-size:16px !important;
    min-width:48px !important;
  }

  .item div{
    gap:8px;
  }

  /* タブ左寄せ */
  .tabbar{
    justify-content:flex-start;
  }

}

</style>
