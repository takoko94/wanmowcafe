<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff7f5;
}

/* レイアウト */
.container {
  display: flex;
}

/* 左（メニュー） */
.main {
  width: 70%;
}

/* 右（カート） */
.sidebar {
  width: 30%;
  background: #fff;
  border-left: 3px solid #ffd6dc;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 15px;
}

/* ロゴ */
.logo {
  width: 260px;
  display: block;
  margin: 10px auto;
}

/* タブ */
.tabbar {
  display: flex;
  overflow-x: auto;
  background: #ffe4ea;
  padding: 10px;
  position: sticky;
  top: 0;
}

.tab {
  margin: 0 5px;
  padding: 10px 15px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
}

.tab.active {
  background: hotpink;
  color: white;
}

/* メニュー */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.item {
  width: 180px;
  background: white;
  border-radius: 15px;
  padding: 10px;
  border: 2px solid #ffd6dc;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

/* ボタン */
button {
  margin: 2px;
  padding: 5px 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add1 { background: pink; }
.add10 { background: hotpink; color: white; }
.minus1 { background: #ddd; }
.minus10 { background: #aaa; color: white; }

/* カート */
.total {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左 -->
  <div class="main">

    <img src="logo.png" class="logo">

    <div class="tabbar" id="tabbar"></div>

    <div id="menu"></div>

  </div>

  <!-- 右 -->
  <div class="sidebar">

    <h3>🧾 注文内容</h3>
    <div id="cart">注文なし</div>

    <div class="total">
      合計: ¥<span id="total">0</span>
    </div>

    <button onclick="confirmOrder()">注文確定</button>
    <button onclick="resetCart()">リセット</button>

    <h3>履歴</h3>
    <div id="history">なし</div>

  </div>

</div>

<script>
const menuData = {

  "Drink": [
    ["も～も～ミルクラテ",3000,"milk_latte.png"],
    ["わんプレッソラテ",3000,"wanpresso.png"],
    ["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
    ["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
  ],

  "Food": [
    ["わんわんサンド",3000,"wanwansand.png"],
    ["わんも～弁当",4000,"wanmow_bento.png"],
    ["わんも～プレート",6000,"wanmow_plate.png"],
    ["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
    ["も～も～ハニートースト",4000,"honey_toast.png"],
    ["まんぷくハンバーグ",4000,"hamburg.png"]
  ],

  "Dessert": [
    ["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
    ["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
  ],

  "Joint": [
    ["ぷにっとわんくーる",3000,"wan_cool.png"],
    ["ぷにっとも～くーる",3000,"mow_cool.png"]
  ],

  "Rescue": [
    ["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
    ["わんわんレスキューサンド",3000,"rescue_sand.png"],
    ["わんわんレスキュードック",3000,"rescue_dog.png"]
  ],

  "期間限定": [
    ["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
    ["わんわんキッシュ",5000,"wan_quiche.png"],
    ["も～も～キッシュ",5000,"mow_quiche.png"]
  ],

  "Secret": [
    ["いちご",4000,"secret_strawberry.png"]
  ]

};

let currentTab = "Drink";
let total = 0;
let cart = {};
let historyList = [];

/* タブ */
function renderTabs() {
  const tabbar = document.getElementById("tabbar");
  tabbar.innerHTML = "";

  for (let key in menuData) {
    const div = document.createElement("div");
    div.className = "tab" + (key === currentTab ? " active" : "");
    div.innerText = key;

    div.onclick = () => {
      currentTab = key;
      renderTabs();
      renderMenu();
    };

    tabbar.appendChild(div);
  }
}

/* メニュー */
function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  menu.className = "menu";

  menuData[currentTab].forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item[2]}">
      <p>${item[0]}</p>
      <p>¥${item[1]}</p>

      <button onclick="removeItem('${item[0]}', ${item[1]}, 10)">-10</button>
      <button onclick="removeItem('${item[0]}', ${item[1]}, 1)">-1</button>
      <button onclick="addItem('${item[0]}', ${item[1]}, 1)">+1</button>
      <button onclick="addItem('${item[0]}', ${item[1]}, 10)">+10</button>
    `;

    menu.appendChild(div);
  });
}

/* 加算 */
function addItem(name, price, qty) {
  total += price * qty;
  cart[name] = (cart[name] || 0) + qty;
  updateUI();
}

/* 減算 */
function removeItem(name, price, qty) {
  if (!cart[name]) return;
  cart[name] -= qty;
  total -= price * qty;

  if (cart[name] <= 0) delete cart[name];
  if (total < 0) total = 0;

  updateUI();
}

/* 更新 */
function updateUI() {
  document.getElementById("total").innerText = total;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]}<br>`;
  }

  document.getElementById("cart").innerHTML = text || "注文なし";
}

/* リセット */
function resetCart() {
  total = 0;
  cart = {};
  updateUI();
}

/* 確定 */
function confirmOrder() {
  if (Object.keys(cart).length === 0) return;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]} / `;
  }

  historyList.unshift(`¥${total} | ${text}`);
  document.getElementById("history").innerHTML =
    historyList.map(h => `<div>${h}</div>`).join("");

  resetCart();
}

/* 初期 */
renderTabs();
renderMenu();
</script>

</body>
</html>
