<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんも〜Cafe</title>

<style>

@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:linear-gradient(180deg,#fffaf5,#f7efe8);
  color:#5c4b42;
  padding:10px;
}

.container{
  display:flex;
  max-width:1200px;
  margin:auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  padding:20px;
  background:#fffdfb;
  border-left:3px solid #e5d6cc;
}

/* ===== タブ ===== */
.tabbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  background:#f3ebe5;
  border-radius:15px;
}

.tab{
  position:relative;
  padding:8px 16px;
  background:#fff;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
}

.tab.active{
  background:#d9a5a5;
  color:white;
}

.tab-badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#cfa18d;
  color:white;
  font-size:11px;
  padding:2px 6px;
  border-radius:999px;
}

/* ===== メニュー ===== */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.item{
  width:200px;
  background:#fffdfb;
  border-radius:15px;
  padding:10px;
  border:1px solid #e5d6cc;
}

.item img{
  width:100%;
  border-radius:10px;
}

/* ===== ボタン ===== */
.qty-btn{
  padding:6px 8px;
  border:none;
  border-radius:8px;
  background:#f4ede7;
  cursor:pointer;
}

.add10{ background:#cfa18d; color:white; }

/* ===== カート ===== */
.cart-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

.total-box{
  margin-top:10px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="main">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div id="cart">注文なし</div>
<div class="total-box">合計: <span id="total">0</span>円</div>
</div>

</div>

<script>

/* ===== 元の完全メニュー復元 ===== */
const menuData = {

Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],

Food:[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],

Dessert:[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],

Joint:[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],

Rescue:[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],

期間限定:[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],

Secret:[
["いちご",4000,"secret_strawberry.png"]
]

};

let currentTab="Drink";
let cart={};

function yen(n){return n.toLocaleString();}

/* ===== タブ ===== */
function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
let count=0;
menuData[key].forEach(item=>{
if(cart[item[0]]) count+=cart[item[0]];
});

const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;

if(count>0){
const badge=document.createElement("div");
badge.className="tab-badge";
badge.innerText=count;
tab.appendChild(badge);
}

tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

/* ===== メニュー ===== */
function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${item[2]}">
<p>${item[0]}</p>
<p>${yen(item[1])}円</p>
<div>
<button class="qty-btn" onclick="change('${item[0]}',-1)">-1</button>
<button class="qty-btn add10" onclick="change('${item[0]}',1)">+1</button>
</div>
`;

menu.appendChild(div);
});
}

/* ===== カート ===== */
function change(name,delta){
cart[name]=(cart[name]||0)+delta;
if(cart[name]<=0) delete cart[name];
renderAll();
}

function renderAll(){
renderTabs();
renderMenu();

let total=0;
let html="";

Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]){
total+=item[1]*cart[item[0]];
html+=`<div class="cart-item">${item[0]} ×${cart[item[0]]}</div>`;
}
});
});

document.getElementById("cart").innerHTML=html||"注文なし";
document.getElementById("total").innerText=yen(total);
}

renderAll();

</script>

</body>
</html>
