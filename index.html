<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fff7f5;
  user-select:none; /* テキスト選択防止 */
}

.container { display:flex; }
.main { width:70%; }

.sidebar {
  width:30%;
  background:#fffafc;
  border-left:4px solid #ffc0cb;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
}

/* ロゴ */
.logo {
  width:260px;
  display:block;
  margin:10px auto;
  pointer-events:none;
}

/* タブ */
.tabbar {
  display:flex;
  overflow-x:auto;
  background:#ffe4ea;
  padding:10px;
  position:sticky;
  top:0;
}

.tab {
  margin:0 5px;
  padding:10px 15px;
  background:white;
  border-radius:10px;
  cursor:pointer;
}

.tab.active {
  background:hotpink;
  color:white;
}

/* メニュー */
.menu {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.item {
  width:180px;
  background:white;
  border-radius:15px;
  padding:10px;
  border:2px solid #ffd6dc;
  position:relative;
}

.item img {
  width:100%;
  border-radius:10px;
  pointer-events:none;
}

/* 個数バッジ */
.count-badge {
  position:absolute;
  top:8px;
  right:8px;
  background:hotpink;
  color:white;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:bold;
}

/* ボタン並び */
.item div {
  display:flex;
  justify-content:center;
  flex-wrap:nowrap;
  gap:4px;
}

.qty-btn {
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
  transition:all 0.15s;
}

.minus10 { background:#ffcdd2; }
.minus1  { background:#ffe0e0; }
.zero    { background:#eee; }
.add1    { background:#ffd6e7; }
.add10   { background:linear-gradient(45deg,pink,hotpink); color:white; }

.qty-btn:active { transform:scale(0.85); }

/* カート */
.cart-title { font-size:20px; font-weight:bold; }

.cart-item {
  background:#fff;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
  border:2px dashed #ffd6dc;
}

.total-box {
  margin-top:15px;
  padding:10px;
  background:#ffe4ea;
  border-radius:10px;
  font-size:20px;
  font-weight:bold;
}

/* ボタン */
.confirm,.reset {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:999px;
  font-size:16px;
  font-weight:bold;
}

.confirm {
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

.reset { background:#ffd1d1; }

.confirm:active,.reset:active { transform:scale(0.9); }

/* 履歴 */
.history-box {
  margin-top:20px;
  background:#fff;
  border-radius:10px;
  padding:10px;
  border:2px solid #ffd6dc;
}

/* ポン */
@keyframes pop {
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}

.pop { animation:pop 0.2s ease; }
</style>
</head>

<body>

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu"></div>
</div>

<div class="sidebar">
<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: ¥<span id="total">0</span>
</div>

<button class="confirm" onclick="confirmOrder()">確定する</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>
</div>

</div>

<script>
const menuData = {
"Drink":[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],
"Food":[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],
"Dessert":[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],
"Joint":[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],
"Rescue":[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],
"期間限定":[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],
"Secret":[
["いちご",4000,"secret_strawberry.png"]
]
};

let currentTab="Drink";
let total=0;
let cart={};
let historyList=[];

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";
for(let key in menuData){
const div=document.createElement("div");
div.className="tab"+(key===currentTab?" active":"");
div.innerText=key;
div.onclick=()=>{currentTab=key;renderTabs();renderMenu();};
tabbar.appendChild(div);
}
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";
menu.className="menu";

menuData[currentTab].forEach(item=>{
const count=cart[item[0]]||0;
const div=document.createElement("div");
div.className="item";

div.innerHTML=`
${count>0?`<div class="count-badge">×${count}</div>`:""}
<img src="${item[2]}" draggable="false">
<p>${item[0]}</p>
<p>¥${item[1]}</p>

<div>
<button class="qty-btn minus10" onclick="removeItem('${item[0]}',${item[1]},10)">-10</button>
<button class="qty-btn minus1" onclick="removeItem('${item[0]}',${item[1]},1)">-1</button>
<button class="qty-btn zero" onclick="clearItem('${item[0]}')">0</button>
<button class="qty-btn add1" onclick="addItem('${item[0]}',${item[1]},1)">+1</button>
<button class="qty-btn add10" onclick="addItem('${item[0]}',${item[1]},10)">+10</button>
</div>
`;

menu.appendChild(div);
});
}

function popEffect(){
const el=document.querySelector(".total-box");
el.classList.remove("pop");
void el.offsetWidth;
el.classList.add("pop");
}

function addItem(name,price,qty){
total+=price*qty;
cart[name]=(cart[name]||0)+qty;
updateUI();
renderMenu();
popEffect();
}

function removeItem(name,price,qty){
if(!cart[name])return;
cart[name]-=qty;
total-=price*qty;
if(cart[name]<=0)delete cart[name];
if(total<0)total=0;
updateUI();
renderMenu();
popEffect();
}

function clearItem(name){
delete cart[name];
updateUI();
renderMenu();
}

function updateUI(){
document.getElementById("total").innerText=total;
let text="";
for(let item in cart){
text+=`<div class="cart-item">${item} ×${cart[item]}</div>`;
}
document.getElementById("cart").innerHTML=text||"注文なし";
}

function resetCart(){
total=0;
cart={};
updateUI();
renderMenu();
}

function confirmOrder(){
if(Object.keys(cart).length===0)return;
let text="";
for(let item in cart){text+=`${item} ×${cart[item]} / `;}
historyList.unshift(`¥${total} | ${text}`);
document.getElementById("history").innerHTML=
historyList.map(h=>`<div>${h}</div>`).join("");
resetCart();
}

renderTabs();
renderMenu();
</script>

</body>
</html>
