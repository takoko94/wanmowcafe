<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんも～Cafe | wanmowcafe</title>

<style>

/* 🔥 フォント読み込み */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:#fffaf5;
  user-select:none;
  padding:10px;
  letter-spacing:0.5px;
  overflow-x:hidden;
}

/* 中央寄せ */
.container{
  display:flex;
  justify-content:center;
  max-width:1200px;
  margin:0 auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:#fffdfb;
  border-left:3px solid #e5d6cc;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
  box-sizing:border-box;
}

/* ロゴ */
.logo{
  width:260px;
  display:block;
  margin:10px auto;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  background:#f3ebe5;
  padding:10px;
}

.tab{
  margin:0 5px;
  padding:10px 15px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  position:relative;
  font-weight:bold;
  flex-shrink:0;
}

.tab.active{
  background:#d9a5a5;
  color:white;
}

/* バッジ */
.tab-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#cfa18d;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:999px;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.item{
  width:200px;
  background:white;
  border-radius:15px;
  padding:12px;
  border:2px solid #e8dcd2;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  position:relative;
}

.item img{
  width:100%;
  border-radius:10px;
}

.count-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:#cfa18d;
  color:white;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
}

/* 商品名高さ固定 */
.item p:first-of-type{
  min-height:40px;
}

/* 価格位置固定 */
.item p:nth-of-type(2){
  margin-top:auto;
  font-weight:bold;
}

/* ===== ボタンエリア ===== */
.item div{
  display:flex;
  justify-content:center;
  gap:4px;
  margin-top:6px;
  flex-wrap:nowrap;
  overflow:hidden;
}

/* ===== ボタン（ポコアニメ追加） ===== */
.qty-btn{
  width:42px;
  height:36px;
  padding:0;
  display:flex;
  align-items:center;
  justify-content:center;

  border:none;
  border-radius:999px;
  cursor:pointer;

  /* ポコ感 */
  box-shadow:0 4px 0 rgba(0,0,0,0.15);
  transition:all 0.1s ease;
}

/* ホバー */
.qty-btn:hover{
  transform:translateY(-2px);
}

/* 押した時 */
.qty-btn:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 rgba(0,0,0,0.2);
}

/* 色 */
.minus10{ background:#f0d6d6; }
.minus1{ background:#f5e1e1; }
.zero{ background:#eee; }
.add1{ background:#e7d8cf; }
.add10{
  background:#cfa18d;
  color:white;
}

/* 数字 */
.qty-num{
  font-size:14px;
  font-weight:bold;
  line-height:1;
}

/* カート */
.cart-title{
  font-size:20px;
  font-weight:bold;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
  border:2px dashed #e8dcd2;
}

.cart-remove{
  background:#d9a5a5;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}

/* 合計 */
.total-box{
  margin-top:15px;
  padding:10px;
  background:#f3ebe5;
  border-radius:10px;
  font-size:20px;
  font-weight:bold;
}

/* ボタン */
.confirm,.reset{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:999px;
  font-size:16px;
  font-weight:bold;
}

.confirm{
  background:#b88976;
  color:white;
}

.reset{ background:#e6d5cc; }

/* 履歴 */
.history-box{
  margin-top:20px;
  background:#fff;
  border-radius:10px;
  padding:10px;
  border:2px solid #e8dcd2;
}

/* ===== スマホ ===== */
@media (max-width:800px){

  .container{ flex-direction:column; }
  .main,.sidebar{ width:100%; }

  .sidebar{
    position:fixed;
    bottom:-100%;
    left:0;
    width:100vw;
    height:70%;
    top:auto;
    border-radius:20px 20px 0 0;
    transition:0.3s;
    z-index:100;
  }

  .sidebar.active{
    bottom:0;
  }

  .overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
    display:none;
    z-index:90;
  }

  .overlay.active{
    display:block;
  }

  .qty-btn{
    width:48px;
    height:40px;
  }

  .qty-num{
    font-size:15px;
  }

  .cart-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#cfa18d;
    color:white;
    padding:14px 16px;
    border-radius:999px;
    z-index:110;
    font-weight:bold;
  }

}

</style>
</head>

<body>

<div class="overlay" onclick="toggleCart()"></div>

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: <span id="total">0</span>円
</div>

<button class="confirm" onclick="confirmOrder()">確定する</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>
</div>

</div>

<div class="cart-toggle" onclick="toggleCart()">
🛒 <span id="floatingTotal">0</span>円
</div>

<script>

const menuData = {

Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],

Food:[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],

Dessert:[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],

Joint:[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],

Rescue:[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],

期間限定:[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],

Secret:[
["いちご",4000,"secret_strawberry.png"]
]

};

let currentTab="Drink";
let cart={};

function getTotal(){
let total=0;
Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]) total+=item[1]*cart[item[0]];
});
});
return total;
}

function toggleCart(){
document.querySelector(".sidebar").classList.toggle("active");
document.querySelector(".overlay").classList.toggle("active");
}

function renderAll(){
renderTabs();
renderMenu();
updateUI();
}

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
let count=0;

menuData[key].forEach(item=>{
if(cart[item[0]]) count+=cart[item[0]];
});

const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;

if(count>0){
const badge=document.createElement("div");
badge.className="tab-badge";
badge.innerText=count;
tab.appendChild(badge);
}

tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const count=cart[item[0]]||0;

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
${count>0?`<div class="count-badge">×${count}</div>`:""}
<img src="${item[2]}">
<p>${item[0]}</p>
<p>${item[1].toLocaleString()}円</p>

<div>
<button class="qty-btn minus10" onclick="change('${item[0]}',-10)">
<span class="qty-num">-10</span>
</button>
<button class="qty-btn minus1" onclick="change('${item[0]}',-1)">
<span class="qty-num">-1</span>
</button>
<button class="qty-btn zero" onclick="clearItem('${item[0]}')">
<span class="qty-num">0</span>
</button>
<button class="qty-btn add1" onclick="change('${item[0]}',1)">
<span class="qty-num">+1</span>
</button>
<button class="qty-btn add10" onclick="change('${item[0]}',10)">
<span class="qty-num">+10</span>
</button>
</div>
`;

menu.appendChild(div);
});
}

function change(name,delta){
cart[name]=(cart[name]||0)+delta;
if(cart[name]<=0) delete cart[name];
renderAll();
}

function clearItem(name){
delete cart[name];
renderAll();
}

function removeFromCart(name){
delete cart[name];
renderAll();
}

function updateUI(){
document.getElementById("total").innerText=getTotal().toLocaleString();
document.getElementById("floatingTotal").innerText=getTotal().toLocaleString();

let html="";
for(let item in cart){
html+=`
<div class="cart-item">
${item} ×${cart[item]}
<button class="cart-remove" onclick="removeFromCart('${item}')">×</button>
</div>`;
}
document.getElementById("cart").innerHTML=html||"注文なし";
}

function resetCart(){
cart={};
renderAll();
}

function confirmOrder(){
if(Object.keys(cart).length===0) return;

let text="";
for(let item in cart){
text+=`${item} ×${cart[item]} / `;
}

document.getElementById("history").innerHTML =
`<div>${getTotal().toLocaleString()}円 | ${text}</div>` +
document.getElementById("history").innerHTML;

resetCart();
}

renderAll();

</script>

</body>
</html>
