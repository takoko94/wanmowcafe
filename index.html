<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんも～Cafe | wanmowcafe</title>

<style>

/* 🔥 フォント読み込み */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:#fff7f5;
  user-select:none;
  padding:10px;
  letter-spacing:0.5px;
}

/* 中央寄せ */
.container{
  display:flex;
  justify-content:center;
  max-width:1200px;
  margin:0 auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:#fffafc;
  border-left:4px solid #ffc0cb;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
}

/* ロゴ */
.logo{
  width:260px;
  display:block;
  margin:10px auto;
  pointer-events:none;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  background:#ffe4ea;
  padding:10px;
}

.tab{
  margin:0 5px;
  padding:10px 15px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  position:relative;
  font-weight:bold;
}

.tab.active{
  background:hotpink;
  color:white;
}

.tab-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:hotpink;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:999px;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.item{
  width:200px;
  background:white;
  border-radius:15px;
  padding:12px;
  border:2px solid #ffd6dc;
  position:relative;
}

.item img{
  width:100%;
  border-radius:10px;
  pointer-events:none;
}

.count-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:hotpink;
  color:white;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
}

/* ボタン */
.item div{
  display:flex;
  justify-content:center;
  gap:4px;
  margin-top:6px;
}

.qty-btn{
  padding:5px 8px;
  border:none;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
}

.minus10{ background:#ffcdd2; }
.minus1{ background:#ffe0e0; }
.zero{ background:#eee; }
.add1{ background:#ffd6e7; }
.add10{
  background:linear-gradient(45deg,pink,hotpink);
  color:white;
}

/* カート */
.cart-title{
  font-size:20px;
  font-weight:bold;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-radius:10px;
  padding:8px;
  margin-bottom:8px;
  border:2px dashed #ffd6dc;
}

.cart-remove{
  background:#ffb3c1;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}

/* 合計 */
.total-box{
  margin-top:15px;
  padding:10px;
  background:#ffe4ea;
  border-radius:10px;
  font-size:20px;
  font-weight:bold;
}

/* ボタン */
.confirm,.reset{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:999px;
  font-size:16px;
  font-weight:bold;
}

.confirm{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

.reset{ background:#ffd1d1; }

/* 履歴 */
.history-box{
  margin-top:20px;
  background:#fff;
  border-radius:10px;
  padding:10px;
  border:2px solid #ffd6dc;
}

/* =========================
   🔥 追加（スマホだけ）
   ========================= */
@media screen and (max-width:768px){

  .container{
    flex-direction:column !important;
  }

  .main{
    width:100% !important;
    padding-bottom:90px !important;
  }

  .sidebar{
    position:fixed !important;
    bottom:0 !important;
    left:0;
    top:auto !important;
    width:100%;
    height:65px;
    overflow:hidden;
    border-left:none;
    border-radius:20px 20px 0 0;
    z-index:9999;
    background:#fffafc;
    box-sizing:border-box;
    padding:10px;
    touch-action: pan-y;
  }

  .sidebar.open{
    height:280px;
    overflow-y:auto;
  }

  .sidebar:not(.open) > *:not(.toggle-bar){
    display:none;
  }

  .toggle-bar{
    width:60px;
    height:6px;
    background:#ff9ecb;
    border-radius:999px;
    margin:10px auto;
  }

  .item{
    width:48% !important;
  }

  .qty-btn{
    padding:12px !important;
    font-size:14px !important;
    min-width:44px !important;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar" id="sidebar">

<!-- 🔥 追加 -->
<div class="toggle-bar" onclick="toggleSidebar()"></div>

<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: ¥<span id="total">0</span>
</div>

<button class="confirm" onclick="confirmOrder()">確定する</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>

</div>

</div>

<script>

/* 🔥 あなたの元JSはそのまま下に置く */

/* 🔥 追加だけ */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

let startY = 0;
let endY = 0;

const sidebar = document.getElementById("sidebar");

if(sidebar){
  sidebar.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
  }, {passive:true});

  sidebar.addEventListener("touchmove", e=>{
    endY = e.touches[0].clientY;
  }, {passive:true});

  sidebar.addEventListener("touchend", ()=>{
    const diff = startY - endY;

    if(diff > 50) sidebar.classList.add("open");
    if(diff < -50) sidebar.classList.remove("open");
  });
}

</script>

</body>
</html>
