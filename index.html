<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff7f5;
}

/* ロゴ */
.logo {
  width: 250px;
  display: block;
  margin: 10px auto;
}

/* タブバー（上固定） */
.tabbar {
  position: sticky;
  top: 0;
  display: flex;
  overflow-x: auto;
  background: #ffe4ea;
  padding: 10px;
  z-index: 1000;
}

/* タブボタン */
.tab {
  flex: none;
  margin: 0 5px;
  padding: 10px 15px;
  border-radius: 10px;
  background: white;
  cursor: pointer;
  font-weight: bold;
}

.tab.active {
  background: #ff69b4;
  color: white;
}

/* メニュー */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.item {
  width: 180px;
  background: white;
  border-radius: 15px;
  padding: 10px;
  border: 2px solid #ffd6dc;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

/* ボタン */
button {
  margin: 2px;
  padding: 5px 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add1 { background: #ffc0cb; }
.add10 { background: #ff69b4; color: white; }
.minus1 { background: #ddd; }
.minus10 { background: #aaa; color: white; }

/* カート */
.cart {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.total {
  font-size: 20px;
  text-align: center;
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<!-- 上タブ -->
<div class="tabbar" id="tabbar"></div>

<!-- メニュー -->
<div id="menu"></div>

<!-- カート -->
<div class="cart" id="cart">注文なし</div>
<div class="total">合計: ¥<span id="total">0</span></div>

<script>
const menuData = {
  "Drink": [
    ["も～も～ミルクラテ",3000,"milk_latte.png"],
    ["わんプレッソラテ",3000,"wanpresso.png"]
  ],
  "Food": [
    ["わんも～弁当",4000,"wanmow_bento.png"],
    ["わんも～プレート",6000,"wanmow_plate.png"]
  ],
  "Rescue": [
    ["も～も～点滴いちごみるく",3000,"strawberry_milk.png"]
  ]
};

let currentTab = "Drink";
let total = 0;
let cart = {};

/* タブ作成 */
function renderTabs() {
  const tabbar = document.getElementById("tabbar");
  tabbar.innerHTML = "";

  for (let key in menuData) {
    const btn = document.createElement("div");
    btn.className = "tab" + (key === currentTab ? " active" : "");
    btn.innerText = key;

    btn.onclick = () => {
      currentTab = key;
      renderTabs();
      renderMenu();
    };

    tabbar.appendChild(btn);
  }
}

/* メニュー表示 */
function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  menu.className = "menu";

  menuData[currentTab].forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item[2]}">
      <p>${item[0]}</p>
      <p>¥${item[1]}</p>

      <button onclick="addItem('${item[0]}', ${item[1]}, 1)">+1</button>
      <button onclick="addItem('${item[0]}', ${item[1]}, 10)">+10</button>
    `;

    menu.appendChild(div);
  });
}

/* 加算 */
function addItem(name, price, qty) {
  total += price * qty;
  cart[name] = (cart[name] || 0) + qty;

  updateUI();
}

/* UI更新 */
function updateUI() {
  document.getElementById("total").innerText = total;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]}<br>`;
  }

  document.getElementById("cart").innerHTML = text || "注文なし";
}

/* 初期表示 */
renderTabs();
renderMenu();
</script>

</body>
</html>
