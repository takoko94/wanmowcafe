<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>

/* 🔥 フォント（そのまま） */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #ffe4ef 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #ffd6ec 0%, transparent 40%),
    linear-gradient(180deg,#fff0f6,#fff7fb);
  user-select:none;
  padding:10px;
  letter-spacing:0.5px;
}

/* 中央寄せ */
.container{
  display:flex;
  justify-content:center;
  max-width:1200px;
  margin:0 auto;
  gap:20px;
}

.main{ width:75%; }

/* サイド */
.sidebar{
  width:25%;
  background:linear-gradient(180deg,#ffe4ef,#fff0f6);
  border-radius:25px;
  border-left:none;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
  box-shadow:0 20px 50px rgba(255,150,180,0.25);
}

/* ロゴ */
.logo{
  width:260px;
  display:block;
  margin:10px auto;
  pointer-events:none;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.tab{
  margin:0;
  padding:10px 18px;
  background:white;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
  position:relative;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition:0.2s;
}

.tab:hover{
  transform:translateY(-2px);
}

.tab.active{
  background:linear-gradient(45deg,#ff9ecb,#ff6fa5);
  color:white;
}

.tab-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:#ff6fa5;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:999px;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:10px;
}

/* カード */
.item{
  width:200px;
  background:white;
  border-radius:25px;
  padding:12px;
  border:none;
  position:relative;
  box-shadow:0 15px 30px rgba(255,150,180,0.2);
  transition:0.2s;
}

.item:hover{
  transform:translateY(-5px);
}

.item img{
  width:100%;
  border-radius:15px;
}

/* 数量 */
.count-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:#ff6fa5;
  color:white;
  border-radius:999px;
  padding:4px 8px;
}

/* ボタン */
.item div{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:6px;
}

.qty-btn{
  padding:6px 8px;
  border:none;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition:0.1s;
}

.qty-btn:active{
  transform:scale(0.9);
}

.minus10{ background:#ffd6d6; }
.minus1{ background:#ffe6e6; }
.zero{ background:#eee; }
.add1{ background:#ffd6ec; }
.add10{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

/* カート */
.cart-title{
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fff;
  border-radius:15px;
  padding:10px;
  margin-bottom:8px;
  border:none;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.cart-remove{
  background:#ff9ecb;
  border:none;
  border-radius:50%;
  width:24px;
  height:24px;
}

/* 合計 */
.total-box{
  margin-top:15px;
  padding:12px;
  background:linear-gradient(45deg,#ffe4ef,#fff0f6);
  border-radius:20px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

/* ボタン */
.confirm,.reset{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:999px;
  font-size:16px;
  font-weight:bold;
}

.confirm{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

.reset{ background:#ffe4ec; }

/* 履歴 */
.history-box{
  margin-top:20px;
  background:#fff;
  border-radius:15px;
  padding:10px;
  border:none;
  box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* スマホ */
@media (max-width:800px){
  .container{ flex-direction:column; }
  .main,.sidebar{ width:100%; }
  .sidebar{ position:static; height:auto; }

  .item{ width:90%; }

  .qty-btn{
    padding:14px;
    font-size:16px;
  }

  .tab{
    font-size:16px;
  }
}

</style>
</head>

<body>

<!-- ↓↓↓ ここから下は一切変更なし ↓↓↓ -->

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: ¥<span id="total">0</span>
</div>

<button class="confirm" onclick="confirmOrder()">確定する</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>
</div>

</div>

<script>

/* 🔥 ここからJSは完全にそのまま（省略せず残してOK） */

const menuData = {

Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],

Food:[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],

Dessert:[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],

Joint:[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],

Rescue:[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],

期間限定:[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],

Secret:[
["いちご",4000,"secret_strawberry.png"]
]

};

let currentTab="Drink";
let cart={};

function getTotal(){
let total=0;
Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]) total+=item[1]*cart[item[0]];
});
});
return total;
}

function renderAll(){
renderTabs();
renderMenu();
updateUI();
}

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
let count=0;

menuData[key].forEach(item=>{
if(cart[item[0]]) count+=cart[item[0]];
});

const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;

if(count>0){
const badge=document.createElement("div");
badge.className="tab-badge";
badge.innerText=count;
tab.appendChild(badge);
}

tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const count=cart[item[0]]||0;

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
${count>0?`<div class="count-badge">×${count}</div>`:""}
<img src="${item[2]}" draggable="false">
<p>${item[0]}</p>
<p>¥${item[1]}</p>

<div>
<button class="qty-btn minus10" onclick="change('${item[0]}',-10)">-10</button>
<button class="qty-btn minus1" onclick="change('${item[0]}',-1)">-1</button>
<button class="qty-btn zero" onclick="clearItem('${item[0]}')">0</button>
<button class="qty-btn add1" onclick="change('${item[0]}',1)">+1</button>
<button class="qty-btn add10" onclick="change('${item[0]}',10)">+10</button>
</div>
`;

menu.appendChild(div);
});
}

function change(name,delta){
cart[name]=(cart[name]||0)+delta;
if(cart[name]<=0) delete cart[name];
renderAll();
}

function clearItem(name){
delete cart[name];
renderAll();
}

function removeFromCart(name){
delete cart[name];
renderAll();
}

function updateUI(){
document.getElementById("total").innerText=getTotal();

let html="";
for(let item in cart){
html+=`
<div class="cart-item">
${item} ×${cart[item]}
<button class="cart-remove" onclick="removeFromCart('${item}')">×</button>
</div>`;
}
document.getElementById("cart").innerHTML=html||"注文なし";
}

function resetCart(){
cart={};
renderAll();
}

function confirmOrder(){
if(Object.keys(cart).length===0) return;

let text="";
for(let item in cart){
text+=`${item} ×${cart[item]} / `;
}

document.getElementById("history").innerHTML =
`<div>¥${getTotal()} | ${text}</div>` +
document.getElementById("history").innerHTML;

resetCart();
}

renderAll();

</script>

</body>
</html>
