<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
body {
  font-family: sans-serif;
  background: #fff7f5;
  margin: 0;
  text-align: center;
}

/* ロゴ */
.logo {
  width: 320px;
  margin: 15px auto;
}

/* タブ */
.tabs {
  display: flex;
  overflow-x: auto;
  background: #ffe4ea;
  padding: 10px;
}

.tab {
  padding: 10px 15px;
  margin: 0 5px;
  background: white;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
}

.tab.active {
  background: #ff69b4;
  color: white;
}

/* メニュー */
.menu {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
  padding: 10px;
}

.item {
  width: 180px;
  background: white;
  border-radius: 15px;
  padding: 10px;
  border: 2px solid #ffd6dc;
}

.item img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin: 2px;
  padding: 5px 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.add1 { background: #ffc0cb; }
.add10 { background: #ff69b4; color: white; }
.minus1 { background: #ddd; }
.minus10 { background: #aaa; color: white; }

/* カート */
.cart {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.total {
  font-size: 20px;
}

.confirm { background: hotpink; color: white; }
.reset { background: #ff9999; color: white; }

</style>
</head>

<body>

<img src="logo.png" class="logo">

<!-- タブ -->
<div class="tabs" id="tabs"></div>

<!-- メニュー -->
<div id="menu"></div>

<!-- カート -->
<div class="cart" id="cart">注文なし</div>
<div class="total">合計: ¥<span id="total">0</span></div>

<button class="confirm" onclick="confirmOrder()">注文確定</button>
<button class="reset" onclick="resetCart()">リセット</button>

<script>
const menuData = {
  "Drink": [
    ["も～も～ミルクラテ",3000,"milk_latte.png"],
    ["わんプレッソラテ",3000,"wanpresso.png"]
  ],
  "Food": [
    ["わんも～弁当",4000,"wanmow_bento.png"],
    ["わんも～プレート",6000,"wanmow_plate.png"]
  ],
  "Dessert": [
    ["いぬぷりん",3000,"pudding_strawberry.png"]
  ]
};

let currentTab = "Drink";
let total = 0;
let cart = {};

function renderTabs() {
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";

  for (let key in menuData) {
    const tab = document.createElement("div");
    tab.className = "tab" + (key === currentTab ? " active" : "");
    tab.innerText = key;

    tab.onclick = () => {
      currentTab = key;
      renderTabs();
      renderMenu();
    };

    tabsDiv.appendChild(tab);
  }
}

function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  menu.className = "menu";

  menuData[currentTab].forEach(item => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img src="${item[2]}">
      <p>${item[0]}</p>
      <p>¥${item[1]}</p>

      <button class="minus10">-10</button>
      <button class="minus1">-1</button>
      <button class="add1">+1</button>
      <button class="add10">+10</button>
    `;

    div.querySelector(".add1").onclick = () => addItem(item[0], item[1], 1);
    div.querySelector(".add10").onclick = () => addItem(item[0], item[1], 10);
    div.querySelector(".minus1").onclick = () => removeItem(item[0], item[1], 1);
    div.querySelector(".minus10").onclick = () => removeItem(item[0], item[1], 10);

    menu.appendChild(div);
  });
}

function addItem(name, price, qty) {
  total += price * qty;
  cart[name] = (cart[name] || 0) + qty;
  updateUI();
}

function removeItem(name, price, qty) {
  if (!cart[name]) return;
  cart[name] -= qty;
  total -= price * qty;

  if (cart[name] <= 0) delete cart[name];
  if (total < 0) total = 0;

  updateUI();
}

function updateUI() {
  document.getElementById("total").innerText = total;

  let text = "";
  for (let item in cart) {
    text += `${item} ×${cart[item]}<br>`;
  }
  document.getElementById("cart").innerHTML = text || "注文なし";
}

function resetCart() {
  total = 0;
  cart = {};
  updateUI();
}

function confirmOrder() {
  alert("注文確定！");
  resetCart();
}

renderTabs();
renderMenu();
</script>

</body>
</html>
