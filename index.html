<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #ffe4ef 0%, transparent 40%),
    radial-gradient(circle at 80% 30%, #ffd6ec 0%, transparent 40%),
    linear-gradient(180deg,#fff0f6,#fff7fb);
  padding:10px;
}

/* レイアウト */
.container{
  display:flex;
  max-width:1200px;
  margin:0 auto;
  gap:20px;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:linear-gradient(180deg,#ffe4ef,#fff0f6);
  border-radius:30px;
  padding:20px;
  box-shadow:0 20px 50px rgba(255,150,180,0.3);
}

/* タブ */
.tabbar{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.tab{
  padding:10px 18px;
  border-radius:999px;
  background:white;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.tab.active{
  background:linear-gradient(45deg,#ff9ecb,#ff6fa5);
  color:white;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.item{
  width:200px;
  background:white;
  border-radius:25px;
  padding:15px;
  text-align:center;
  box-shadow:0 15px 35px rgba(255,150,180,0.25);
}

.item img{
  width:100%;
  border-radius:15px;
}

.qty{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}

.qty button{
  border:none;
  border-radius:999px;
  padding:8px 10px;
  background:#ffe4ec;
  cursor:pointer;
}

/* カート */
.cart-item{
  background:white;
  border-radius:15px;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}

.total{
  font-size:20px;
  text-align:center;
  margin-top:10px;
}

button.big{
  width:100%;
  padding:15px;
  margin-top:10px;
  border-radius:999px;
  border:none;
}

/* スマホ */
@media (max-width:800px){
  .container{ flex-direction:column; }
  .main,.sidebar{ width:100%; }
  .item{ width:90%; }
  .qty button{ padding:14px; font-size:16px; }
}
</style>
</head>

<body>

<div class="container">

<div class="main">
<div class="tabbar" id="tabs"></div>
<div class="menu" id="menu"></div>
</div>

<div class="sidebar">
<div id="cart">注文なし</div>
<div class="total">¥<span id="total">0</span></div>
<button class="big" onclick="resetCart()">リセット</button>
</div>

</div>

<script>

/* 🔥 ここだけがメニュー */
const menuData = {

Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],

Food:[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],

Dessert:[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],

Joint:[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],

Rescue:[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],

期間限定:[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],

Secret:[
["いちご",4000,"secret_strawberry.png"]
]

};

let current="Drink";
let cart={};

function render(){
renderTabs();
renderMenu();
renderCart();
}

function renderTabs(){
const t=document.getElementById("tabs");
t.innerHTML="";
Object.keys(menuData).forEach(k=>{
const div=document.createElement("div");
div.className="tab"+(k===current?" active":"");
div.innerText=k;
div.onclick=()=>{current=k;render();}
t.appendChild(div);
});
}

function renderMenu(){
const m=document.getElementById("menu");
m.innerHTML="";
menuData[current].forEach(i=>{
const d=document.createElement("div");
d.className="item";
d.innerHTML=`
<img src="${i[2]}">
<p>${i[0]}</p>
<p>¥${i[1]}</p>
<div class="qty">
<button onclick="add('${i[0]}',1)">+1</button>
<button onclick="add('${i[0]}',10)">+10</button>
<button onclick="remove('${i[0]}',1)">-1</button>
<button onclick="remove('${i[0]}',10)">-10</button>
<button onclick="clearItem('${i[0]}')">0</button>
</div>
`;
m.appendChild(d);
});
}

function add(n,q){
cart[n]=(cart[n]||0)+q;
render();
}

function remove(n,q){
if(!cart[n])return;
cart[n]-=q;
if(cart[n]<=0)delete cart[n];
render();
}

function clearItem(n){
delete cart[n];
render();
}

function renderCart(){
let total=0;
let html="";
Object.keys(cart).forEach(k=>{
let price=0;
Object.values(menuData).forEach(l=>{
l.forEach(i=>{ if(i[0]===k) price=i[1]; });
});
total+=price*cart[k];
html+=`<div class="cart-item">${k} ×${cart[k]}</div>`;
});
document.getElementById("cart").innerHTML=html||"注文なし";
document.getElementById("total").innerText=total;
}

function resetCart(){
cart={};
render();
}

render();

</script>

</body>
</html>
