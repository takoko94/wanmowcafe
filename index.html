<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんも～Cafe | wanmowcafe</title>

<style>

/* フォント */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:linear-gradient(180deg,#ffeef3,#fff7fb);
  padding:10px;
}

/* 全体 */
.container{
  display:flex;
  justify-content:center;
  max-width:1200px;
  margin:0 auto;
  gap:20px;
}

.main{ width:70%; }

.sidebar{
  width:30%;
  background:#fff0f5;
  border-radius:25px;
  padding:20px;
  box-shadow:0 10px 30px rgba(255,150,180,0.3);
}

/* ロゴ */
.logo{
  width:320px;
  display:block;
  margin:10px auto;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.tab{
  padding:10px 18px;
  background:#fff;
  border-radius:20px;
  cursor:pointer;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.tab.active{
  background:linear-gradient(45deg,#ffb6d5,#ff6fa5);
  color:white;
}

.tab-badge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:#ff6fa5;
  color:white;
  font-size:12px;
  padding:4px 7px;
  border-radius:999px;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

/* カード */
.item{
  width:200px;
  background:white;
  border-radius:25px;
  padding:15px;
  box-shadow:0 10px 25px rgba(255,150,180,0.25);
  text-align:center;
  position:relative;
}

.item img{
  width:100%;
  border-radius:15px;
}

/* 数量 */
.count-badge{
  position:absolute;
  top:10px;
  right:10px;
  background:#ff6fa5;
  color:white;
  border-radius:999px;
  padding:5px 10px;
}

/* ボタン */
.item div{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-top:8px;
}

.qty-btn{
  padding:8px 10px;
  border:none;
  border-radius:999px;
  font-size:13px;
  background:#ffe4ec;
  cursor:pointer;
}

.qty-btn:active{
  transform:scale(0.9);
}

.minus10{ background:#ffd6d6; }
.minus1{ background:#ffe6e6; }
.zero{ background:#eee; }
.add1{ background:#ffd6ec; }
.add10{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

/* カート */
.cart-title{
  font-size:22px;
  text-align:center;
}

.cart-item{
  background:white;
  border-radius:15px;
  padding:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}

.cart-remove{
  background:#ff9ecb;
  border:none;
  border-radius:50%;
  width:24px;
  height:24px;
}

/* 合計 */
.total-box{
  margin-top:15px;
  padding:12px;
  background:linear-gradient(45deg,#ffd6ec,#ffeaf5);
  border-radius:20px;
  text-align:center;
  font-size:20px;
}

/* ボタン */
.confirm,.reset{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:999px;
  font-size:18px;
  border:none;
}

.confirm{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

.reset{
  background:#ffe4ec;
}

/* スマホ */
@media (max-width:800px){
  .container{ flex-direction:column; }
  .main,.sidebar{ width:100%; }
  .item{ width:90%; }

  .qty-btn{
    padding:14px;
    font-size:16px;
  }
}

</style>
</head>

<body>

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: ¥<span id="total">0</span>
</div>

<button class="confirm" onclick="confirmOrder()">確定する</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>
</div>

</div>

<script>

/* メニュー */
const menuData = {
Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"]
],
Food:[
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"]
]
};

let currentTab="Drink";
let cart={};

function getTotal(){
let total=0;
Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]) total+=item[1]*cart[item[0]];
});
});
return total;
}

function renderAll(){
renderTabs();
renderMenu();
updateUI();
}

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;
tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const count=cart[item[0]]||0;

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
${count>0?`<div class="count-badge">×${count}</div>`:""}
<img src="${item[2]}">
<p>${item[0]}</p>
<p>¥${item[1]}</p>

<div>
<button class="qty-btn minus10" onclick="change('${item[0]}',-10)">-10</button>
<button class="qty-btn minus1" onclick="change('${item[0]}',-1)">-1</button>
<button class="qty-btn zero" onclick="clearItem('${item[0]}')">0</button>
<button class="qty-btn add1" onclick="change('${item[0]}',1)">+1</button>
<button class="qty-btn add10" onclick="change('${item[0]}',10)">+10</button>
</div>
`;

menu.appendChild(div);
});
}

function change(name,delta){
cart[name]=(cart[name]||0)+delta;
if(cart[name]<=0) delete cart[name];
renderAll();
}

function clearItem(name){
delete cart[name];
renderAll();
}

function removeFromCart(name){
delete cart[name];
renderAll();
}

function updateUI(){
document.getElementById("total").innerText=getTotal();

let html="";
for(let item in cart){
html+=`
<div class="cart-item">
${item} ×${cart[item]}
<button class="cart-remove" onclick="removeFromCart('${item}')">×</button>
</div>`;
}
document.getElementById("cart").innerHTML=html||"注文なし";
}

function resetCart(){
cart={};
renderAll();
}

function confirmOrder(){
resetCart();
}

renderAll();

</script>

</body>
</html>
