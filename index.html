<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんも〜Cafe | wanmowcafe</title>

<style>

/* ===== フォント ===== */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

/* ===== 背景（ミルク×いちご＋牛柄） ===== */
body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:
    radial-gradient(circle at 20% 20%, #fff 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, #ffe4ea 0%, transparent 40%),
    linear-gradient(180deg,#fff7f5,#ffe4ea);
  user-select:none;
  padding:10px;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background-image:
    radial-gradient(#ffd6dc 15%, transparent 16%),
    radial-gradient(#ffd6dc 15%, transparent 16%);
  background-size:120px 120px;
  background-position:0 0,60px 60px;
  opacity:0.15;
  z-index:-1;
}

/* ===== レイアウト ===== */
.container{
  display:flex;
  justify-content:center;
  max-width:1200px;
  margin:0 auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:#fffafc;
  border-left:4px solid #ffc0cb;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
  border-radius:20px;
}

/* ===== ロゴ ===== */
.logo{
  width:260px;
  display:block;
  margin:10px auto;
}

/* ===== タブ ===== */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  background:#ffe4ea;
  padding:10px;
  border-radius:15px;
}

.tab{
  margin:0 5px;
  padding:10px 18px;
  background:white;
  border-radius:999px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.tab.active{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
}

.tab-badge{
  position:absolute;
  top:-5px;
  right:-5px;
  background:hotpink;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:999px;
}

/* ===== メニュー ===== */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
  padding:10px;
}

.item{
  width:200px;
  background:white;
  border-radius:20px;
  padding:12px;
  border:2px solid #ffd6dc;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 8px 16px rgba(255,182,193,0.35);
  transition:all 0.2s;
}

.item:hover{
  transform:translateY(-6px) scale(1.02);
}

.item img{
  width:100%;
  border-radius:15px;
}

.count-badge{
  position:absolute;
  top:8px;
  right:8px;
  background:hotpink;
  color:white;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
}

/* ===== ボタン ===== */
.item div{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:6px;
}

.qty-btn{
  border:none;
  border-radius:999px;
  padding:10px 12px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:
    inset 0 -4px 0 rgba(0,0,0,0.1),
    0 5px 10px rgba(255,105,180,0.35);
  transition:all 0.15s;
}

.qty-btn:hover{
  transform:translateY(-2px) scale(1.05);
}

.qty-btn:active{
  transform:translateY(2px) scale(0.95);
  box-shadow:inset 0 3px 6px rgba(0,0,0,0.15);
}

.minus10{ background:#ffcdd2; }
.minus1{ background:#ffe0e0; }
.zero{ background:#f3f3f3; }
.add1{ background:#ffd6e7; }

.add10{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4,#ffc1da);
  color:white;
}

/* ===== カート ===== */
.cart-title{
  font-size:20px;
  font-weight:bold;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#fffdfd;
  border-radius:12px;
  padding:8px;
  margin-bottom:8px;
  border:2px dashed #ffd6dc;
  box-shadow:0 4px 8px rgba(255,182,193,0.2);
}

.cart-remove{
  background:#ffb3c1;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}

/* ===== 合計 ===== */
.total-box{
  margin-top:15px;
  padding:10px;
  background:linear-gradient(45deg,#ffe4ea,#ffd6dc);
  border-radius:15px;
  font-size:20px;
  font-weight:bold;
}

/* ===== ボタン ===== */
.confirm,.reset{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:999px;
  font-size:16px;
  font-weight:bold;
}

.confirm{
  background:linear-gradient(45deg,#ff9ecb,#ff69b4);
  color:white;
  box-shadow:0 5px 12px rgba(255,105,180,0.4);
}

.reset{ background:#ffd1d1; }

/* ===== 履歴 ===== */
.history-box{
  margin-top:20px;
  background:#fff;
  border-radius:10px;
  padding:10px;
  border:2px solid #ffd6dc;
}

/* ===== スマホ ===== */
@media (max-width:800px){
  .container{ flex-direction:column; }
  .main,.sidebar{ width:100%; }
  .sidebar{ position:static; height:auto; }
  .item{ width:45%; }
}

</style>
</head>

<body>

<div class="container">

<div class="main">
<img src="logo.png" class="logo">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div class="cart-title">注文内容</div>
<div id="cart">注文なし</div>

<div class="total-box">
合計: ¥<span id="total">0</span>
</div>

<button class="confirm" onclick="confirmOrder()">確定する 🐾</button>
<button class="reset" onclick="resetCart()">リセット</button>

<div class="history-box">
<h3>履歴</h3>
<div id="history">なし</div>
</div>
</div>

</div>

<script>

/* ===== メニュー ===== */
const menuData = {

Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"],
["わんプレッソラテ",3000,"wanpresso.png"],
["も～っとしゅわっとクリームソーダ",3000,"cream_soda.png"],
["ちょっぴりビターなわんコーヒーフロート",3000,"coffee_float.png"]
],

Food:[
["わんわんサンド",3000,"wanwansand.png"],
["わんも～弁当",4000,"wanmow_bento.png"],
["わんも～プレート",6000,"wanmow_plate.png"],
["ぎゅっとぽかぽかクリームシチュー",3000,"mowmow_stew.png"],
["も～も～ハニートースト",4000,"honey_toast.png"],
["まんぷくハンバーグ",4000,"hamburg.png"]
],

Dessert:[
["いぬぷりん（いちご味）",3000,"pudding_strawberry.png"],
["いぬぷりん（マンゴー味）",3000,"pudding_mango.png"]
],

Joint:[
["ぷにっとわんくーる",3000,"wan_cool.png"],
["ぷにっとも～くーる",3000,"mow_cool.png"]
],

Rescue:[
["も～も～点滴いちごみるく",3000,"strawberry_milk.png"],
["わんわんレスキューサンド",3000,"rescue_sand.png"],
["わんわんレスキュードック",3000,"rescue_dog.png"]
],

期間限定:[
["しゅわしゅわオレンジソーダ",5000,"orange_soda.png"],
["わんわんキッシュ",5000,"wan_quiche.png"],
["も～も～キッシュ",5000,"mow_quiche.png"]
],

Secret:[
["いちご",4000,"secret_strawberry.png"]
]

};

let currentTab="Drink";
let cart={};

function getTotal(){
let total=0;
Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]) total+=item[1]*cart[item[0]];
});
});
return total;
}

/* ぷにアニメ */
function popEffect(){
document.body.style.transform="scale(0.995)";
setTimeout(()=>{document.body.style.transform="scale(1)";},80);
}

function renderAll(){
renderTabs();
renderMenu();
updateUI();
}

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
let count=0;

menuData[key].forEach(item=>{
if(cart[item[0]]) count+=cart[item[0]];
});

const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;

tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const count=cart[item[0]]||0;

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
${count>0?`<div class="count-badge">×${count}</div>`:""}
<img src="${item[2]}">
<p>${item[0]}</p>
<p>¥${item[1]}</p>

<div>
<button class="qty-btn minus10" onclick="change('${item[0]}',-10)">-10</button>
<button class="qty-btn minus1" onclick="change('${item[0]}',-1)">-1</button>
<button class="qty-btn zero" onclick="clearItem('${item[0]}')">0</button>
<button class="qty-btn add1" onclick="change('${item[0]}',1)">+1 🐾</button>
<button class="qty-btn add10" onclick="change('${item[0]}',10)">+10 🐾</button>
</div>
`;

menu.appendChild(div);
});
}

function change(name,delta){
cart[name]=(cart[name]||0)+delta;
if(cart[name]<=0) delete cart[name];
popEffect();
renderAll();
}

function clearItem(name){
delete cart[name];
renderAll();
}

function removeFromCart(name){
delete cart[name];
renderAll();
}

function updateUI(){
document.getElementById("total").innerText=getTotal();

let html="";
for(let item in cart){
html+=`
<div class="cart-item">
${item} ×${cart[item]}
<button class="cart-remove" onclick="removeFromCart('${item}')">×</button>
</div>`;
}
document.getElementById("cart").innerHTML=html||"注文なし";
}

function resetCart(){
cart={};
renderAll();
}

function confirmOrder(){
if(Object.keys(cart).length===0) return;

let text="";
for(let item in cart){
text+=`${item} ×${cart[item]} / `;
}

document.getElementById("history").innerHTML =
`<div>¥${getTotal()} | ${text}</div>` +
document.getElementById("history").innerHTML;

resetCart();
}

renderAll();

</script>

</body>
</html>
