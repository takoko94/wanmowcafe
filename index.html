<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんも～Cafe | wanmowcafe</title>

<style>

/* フォント */
@font-face {
  font-family: 'Yasashisa';
  src: url('YasashisaGothicBold-V2.otf') format('opentype');
}

body{
  margin:0;
  font-family:'Yasashisa', sans-serif;
  background:#fff7f5;
  user-select:none;
  padding:10px;
}

/* レイアウト */
.container{
  display:flex;
  max-width:1200px;
  margin:0 auto;
}

.main{ width:75%; }

.sidebar{
  width:25%;
  background:#fffafc;
  border-left:4px solid #ffc0cb;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  padding:20px;
}

/* タブ */
.tabbar{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  background:#ffe4ea;
  padding:10px;
}

.tab{
  margin:0 5px;
  padding:10px;
  background:white;
  border-radius:10px;
  cursor:pointer;
}

.tab.active{
  background:hotpink;
  color:white;
}

/* メニュー */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.item{
  width:200px;
  background:white;
  border-radius:15px;
  padding:10px;
}

.item img{ width:100%; }

/* ボタン */
.qty-btn{
  padding:6px;
  border-radius:999px;
}

/* ===== スマホ修正 ===== */
@media screen and (max-width:1024px){

  .container{
    flex-direction:column;
  }

  .main{
    width:100%;
    padding-bottom:120px;
  }

  /* 下バー */
  .sidebar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    max-height:120px;
    overflow-y:auto;
    border-left:none;
    border-radius:20px 20px 0 0;
    z-index:9999;
  }

  .item{
    width:48%;
  }

  .qty-btn{
    padding:14px;
    font-size:14px;
    min-width:44px;
  }

}

</style>
</head>

<body>

<div class="container">

<div class="main">
<div class="tabbar" id="tabbar"></div>
<div id="menu" class="menu"></div>
</div>

<div class="sidebar">
<div>注文内容</div>
<div id="cart">注文なし</div>

<div>
合計: ¥<span id="total">0</span>
</div>

<button onclick="confirmOrder()">確定する</button>
<button onclick="resetCart()">リセット</button>

<div>
履歴
<div id="history">なし</div>
</div>
</div>

</div>

<script>

const menuData = {
Drink:[
["も～も～ミルクラテ",3000,"milk_latte.png"]
]
};

let currentTab="Drink";
let cart={};

function getTotal(){
let total=0;
Object.values(menuData).forEach(list=>{
list.forEach(item=>{
if(cart[item[0]]) total+=item[1]*cart[item[0]];
});
});
return total;
}

function renderAll(){
renderTabs();
renderMenu();
updateUI();
}

function renderTabs(){
const tabbar=document.getElementById("tabbar");
tabbar.innerHTML="";

Object.keys(menuData).forEach(key=>{
const tab=document.createElement("div");
tab.className="tab"+(key===currentTab?" active":"");
tab.innerText=key;
tab.onclick=()=>{currentTab=key;renderAll();};
tabbar.appendChild(tab);
});
}

function renderMenu(){
const menu=document.getElementById("menu");
menu.innerHTML="";

menuData[currentTab].forEach(item=>{
const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${item[2]}">
<p>${item[0]}</p>
<p>¥${item[1]}</p>

<div>
<button class="qty-btn" onclick="change('${item[0]}',1)">+1</button>
</div>
`;

menu.appendChild(div);
});
}

function change(name,delta){
cart[name]=(cart[name]||0)+delta;
renderAll();
}

function updateUI(){
document.getElementById("total").innerText=getTotal();

let html="";
for(let item in cart){
html+=`${item} ×${cart[item]}<br>`;
}
document.getElementById("cart").innerHTML=html||"注文なし";
}

function resetCart(){
cart={};
renderAll();
}

function confirmOrder(){
resetCart();
}

renderAll();

</script>

</body>
</html>
